name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest       # Apple Silicon (aarch64)
            args: "--target aarch64-apple-darwin"
            rust-target: aarch64-apple-darwin
          - platform: macos-13           # Intel (x86_64)
            args: "--target x86_64-apple-darwin"
            rust-target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust-target: ""
          - platform: windows-latest
            args: ""
            rust-target: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAWDESK_LICENSE_SECRET: ${{ secrets.CLAWDESK_LICENSE_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ClawDesk ${{ github.ref_name }}"
          releaseBody: |
            ## Install

            **macOS (Apple Silicon)**
            ```bash
            bash <(curl -fsSL https://raw.githubusercontent.com/lucvpgs/ClawDesk/main/install.sh)
            ```

            **macOS (Intel)**, **Linux**, **Windows** — download the installer below for your platform.

            ## Requirements
            - OpenClaw installed and running
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
